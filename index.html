ace(/\./g, '-');       const ipRef = ref(db, 'verified_devices/' + safeIP);      const ipSnapshot = await get(ipRef);      if (ipSnapshot.exists()) {        const registeredUserId = ipSnapshot.val().toString();        if (registeredUserId !== user.id.toString()) {          document.getElementById("loadingScreen").style.display = "none";          document.body.innerHTML = "<div class='error-container' style='color:#ff0000; padding:20px; font-weight:bold;'>" +                                    "<h3>অ্যাক্সেস ব্লক করা হয়েছে (IP Lock)!</h3>" +                                    "<p>আপনার এই ইন্টারনেট কানেকশন বা ডিভাইসে ইতিমধ্যে একটি অ্যাকাউন্ট রেজিস্টার্ড আছে।</p>" +                                    "<p style='font-size:13px; color:#666;'>একই ডিভাইসে অন্য টেলিগ্রাম অ্যাপ ব্যবহার করে একাধিক অ্যাকাউন্ট চালানো নিষিদ্ধ!</p>" +                                    "</div>";          return;        }      }      userRef = ref(db, 'users/' + user.id);      const snapshot = await get(userRef);            if(snapshot.exists()) {        uData = snapshot.val();        if(uData.referredBy === undefined) uData.referredBy = null;        if(uData.lastWithdraw === undefined) uData.lastWithdraw = 0;      } else {        let startParam = tg.initDataUnsafe?.start_param;        if (startParam && startParam !== user.id.toString() && startParam !== "null") {          uData.referredBy = startParam.toString();        }        await set(userRef, uData);      }      if (!ipSnapshot.exists()) {        await set(ipRef, user.id.toString());      }      document.getElementById("loadingScreen").style.display = "none";      document.getElementById("mainDashboard").style.display = "flex";      document.getElementById("noticeSection").style.display = "block";      document.getElementById("tgBtn").style.display = "flex";      document.getElementById("ytBtn").style.display = "flex";      document.getElementById("adBtns").style.display = "flex";      document.get
